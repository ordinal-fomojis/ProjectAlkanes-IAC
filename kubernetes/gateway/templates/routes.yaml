{{- range $config := .Values.routes -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $config.subdomain }}-http-route
spec:
  parentRefs:
  - name: gateway
    sectionName: {{ $config.subdomain }}-https
  hostnames:
  - "{{ $config.subdomain }}.shovel.space"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ $config.service }}
      port: 80
---
{{- end -}}
