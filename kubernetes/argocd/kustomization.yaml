apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
- base/argocd-namespace.yaml
- github.com/argoproj/argo-cd/manifests/cluster-install?ref=stable

patches:
- path: patches/argocd-cmd-params-cm.yaml

secretGenerator:
- name: github-repo-credential
  options:
    disableNameSuffixHash: true
    labels:
      argocd.argoproj.io/secret-type: repository
  literals:
  - type=git
  - url=https://github.com/ordinal-fomojis/ProjectAlkanes-IAC
  - username=admin
  env: .env
