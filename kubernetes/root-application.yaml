apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ordinal-fomojis/ProjectAlkanes-IAC
    targetRevision: HEAD
    path: kubernetes/root
  destination:
    server: https://kubernetes.default.svc
    namespace: root-application

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
