{{- range $config := .Values.environments -}}
{{- if $config.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $config.name }}-deployment
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $config.name }}-shovel-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $config.name }}-shovel-app
    spec:
      restartPolicy: Always
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: {{ $config.name }}-shovel-be
        image: shovelacr.azurecr.io/shovel-be:{{ $config.tag }}
        env:
        - name: APP_ENV
          value: {{ $config.name }}
        - name: NODE_ENV
          value: production
        - name: RATE_LIMIT_ENABLED
          value: "false"
        - name: DOTENV_PATH
          value: "env/.env.{{ $config.name }}"
        - name: DOTENV_PRIVATE_KEY_{{ $config.name | upper }}
          valueFrom:
            secretKeyRef:
              name: {{ include "dotenvSecretName" $config }}
              key: key
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: {{ $.Values.resources.requests.cpu }}
            memory: {{ $.Values.resources.requests.memory }}
          limits:
            cpu: {{ $.Values.resources.limits.cpu }}
            memory: {{ $.Values.resources.limits.memory }}
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
---
{{- end -}}
{{- end -}}
