baseSubdomain: apiv2

autoscaling:
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

environments:
  - name: prod
    tag: 0390b531366cd07052ec11b0cf0591202283302a
    enabled: true
    autoscaling:
      minReplicas: 2
      maxReplicas: 10
  - name: stage
    tag: 0390b531366cd07052ec11b0cf0591202283302a
    enabled: false
  - name: mock
    tag: 0390b531366cd07052ec11b0cf0591202283302a
    enabled: false
  - name: testnet
    tag: 0390b531366cd07052ec11b0cf0591202283302a
    enabled: false
  - name: dev
    tag: 0390b531366cd07052ec11b0cf0591202283302a
    enabled: true

# Routes, other than those for the main app, which are inferred from the environments above
routes:
- name: argocd
  subdomain: argocd
  service: argocd-server
  namespace: argocd
