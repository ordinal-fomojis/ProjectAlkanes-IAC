baseSubdomain: api

autoscaling:
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

resources:
  requests:
    cpu: 200m
    memory: 300Mi
  limits:
    cpu: 500m
    memory: 512Mi

environments:
- name: prod
  tag: 2ac0b5e345bc123798b7fb539e26ef0211b47e07
  enabled: true
  autoscaling:
    minReplicas: 1
    maxReplicas: 10
- name: stage
  tag: 2ac0b5e345bc123798b7fb539e26ef0211b47e07
  enabled: false
- name: mock
  tag: 765513f5319efc72baeb8a01fe3c57da556d736a
  enabled: false
- name: testnet
  tag: 765513f5319efc72baeb8a01fe3c57da556d736a
  enabled: false
- name: dev
  tag: 765513f5319efc72baeb8a01fe3c57da556d736a
  enabled: true

# Routes, other than those for the main app, which are inferred from the environments above
routes:
- name: argocd
  subdomain: argocd
  service: argocd-server
  namespace: argocd
