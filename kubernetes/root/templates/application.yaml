{{- range $config := .Values.apps -}}
{{- if $config.enabled | ne false -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $config.name }}
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ordinal-fomojis/ProjectAlkanes-IAC
    targetRevision: HEAD
    path: kubernetes/{{ $config.name }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ $config.name }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
{{- end -}}
{{- end -}}
