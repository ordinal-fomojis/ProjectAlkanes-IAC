name: Deploy Argo CD
on:
  workflow_dispatch:
    inputs:
      id:
        description: 'Id of the IaC deployment. Leave blank for the default prod deployment.'
        default: ''
        type: string

permissions:
  id-token: write # Required for OIDC authentication with Azure
  contents: read

env:
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ID: ${{ inputs.id || '' }}
  TFSTATE_FILE: ${{ inputs.id == '' && 'shovel.tfstate' || format('shovel-{0}.tfstate', inputs.id) }}

jobs:
  argocd-deploy:
    name: 'Deploy Argo CD'
    runs-on: ubuntu-latest
    environment: ${{ inputs.id == '' && 'prod' || 'nonprod' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        id: tf-outputs
        run: |
          terraform init -backend-config="key=${{ env.TFSTATE_FILE }}"
          echo "rg_name=$(terraform output -raw rg_name)" >> $GITHUB_OUTPUT
          echo "aks_cluster_name=$(terraform output -raw aks_cluster_name)" >> $GITHUB_OUTPUT
        working-directory: terraform

      - name: Set up kubelogin for non-interactive login
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: 'v0.0.25'
          
      - name: Get Kube Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ steps.tf-outputs.outputs.rg_name }}
          cluster-name: ${{ steps.tf-outputs.outputs.aks_cluster_name }}
          admin: 'true'
          use-kubelogin: 'true'

      - name: Install Gateway API CRDs
        run: |
          kubectl apply --server-side -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.4.1/standard-install.yaml
      
      - name: Install Argo CD into aks
        run: |
          SECRETS_FILE=$(mktemp)
          chmod 600 "$SECRETS_FILE"
          
          cat > "$SECRETS_FILE" <<EOF
          gitPassword: "$ALKANES_IAC_PAT"
          dotenvPrivateKeys:
            prod: "$DOTENV_PROD"
            nonprod: "$DOTENV_NONPROD"
          EOF
          
          helm upgrade --install cluster-config ./cluster-config -f "$SECRETS_FILE"
          
          shred -u "$SECRETS_FILE"
          
          kubectl apply -k ./argocd
          kubectl apply -f ./root-application.yaml
        working-directory: kubernetes
        env:
          ALKANES_IAC_PAT: ${{ secrets.ALKANES_IAC_PAT }}
          DOTENV_PROD: ${{ secrets.SHOVEL_DOTENV_PRIVATE_KEY_PROD }}
          DOTENV_NONPROD: ${{ secrets.SHOVEL_DOTENV_PRIVATE_KEY_NONPROD }}
    
      - name: Sleep
        run: sleep 30

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup DNS Record
        run: |
          npm ci
          npm run setup-dns
        env:
          VERCEL_TOKEN: ${{ secrets.SHOVEL_VERCEL_TOKEN }}
          TEAM_SLUG: shovel-189a0c86
          DOMAIN: shovel.space
