name: Deploy Terraform
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      id:
        description: 'Id of the deployment. Each unique Id creates separate, independent resources in different resource groups. Leave blank for the default prod deployment.'
        default: ''
        type: string

permissions:
  id-token: write # Required for OIDC authentication with Azure
  contents: read

defaults:
  run:
    working-directory: terraform

env:
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ID: ${{ inputs.id || '' }}
  TFSTATE_FILE: ${{ inputs.id == '' && 'shovel.tfstate' || format('shovel-{0}.tfstate', inputs.id) }}

jobs:
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    environment: ${{ inputs.id == '' && 'prod' || 'nonprod' }}
    outputs:
      tfplanExitCode: ${{ steps.tf-plan.outputs.exitcode }}
      formatted_plan: ${{ steps.publish-terraform-plan.outputs.formatted_plan }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend-config="key=${{ env.TFSTATE_FILE }}"
      
      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Plan
        id: tf-plan
        run: |
          export exitcode=0
          terraform plan -detailed-exitcode -no-color -out tfplan || export exitcode=$?
  
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          
          if [ $exitcode -eq 1 ]; then
            echo Terraform Plan Failed!
            exit 1
          else 
            exit 0
          fi
        env:
          TF_VAR_id: ${{ env.ID }}

      - name: Publish Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
      
      - name: Publish Terraform Plan to Task Summary
        id: publish-terraform-plan
        run: |
          TERRAFORM_PLAN=$(terraform show -no-color tfplan)
          
          FORMATTED_PLAN=$'## Terraform Plan Output\n'
          FORMATTED_PLAN+=$'<details><summary>Click to expand</summary>\n\n'
          FORMATTED_PLAN+=$'```terraform\n'
          FORMATTED_PLAN+=$TERRAFORM_PLAN
          FORMATTED_PLAN+=$'\n```\n</details>'

          echo "$FORMATTED_PLAN" >> $GITHUB_STEP_SUMMARY

          {
            echo 'formatted_plan<<EOF'
            echo "$FORMATTED_PLAN"
            echo EOF
          } >> "$GITHUB_OUTPUT"

  terraform-apply:
    name: 'Terraform Apply'
    if: needs.terraform-plan.outputs.tfplanExitCode == 2 && (github.ref_name == 'main' || inputs.id != '')
    runs-on: ubuntu-latest
    environment: ${{ inputs.id == '' && 'prod' || 'nonprod' }}
    needs: [terraform-plan]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Azure CLI Login
      uses: azure/login@v2
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
    
    - name: Terraform Init
      run: terraform init -backend-config="key=${{ env.TFSTATE_FILE }}"

    - name: Download Terraform Plan
      uses: actions/download-artifact@v4
      with:
        name: tfplan
        path: terraform

    - name: Terraform Apply
      run: terraform apply -auto-approve tfplan
        
